<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Product CRUD</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>

    <div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white text-center">
                    <h3 class="m-0 font-weight-bold">Product Form</h3>
                </div>
                <div class="card-body">
                    <form id="productForm">
                        <div class="form-group font-weight-bold">
                            <label for="title">Title*</label>
                            <input type="text" id="title" class="form-control" required>
                        </div>
                        <div class="form-group font-weight-bold">
                            <label for="price">Price*</label>
                            <input type="number" id="price" class="form-control" required>
                        </div>
                        <div class="form-group font-weight-bold">
                            <label for="brand">Brand*</label>
                            <input type="text" id="brand" class="form-control" required>
                        </div>
                        <div class="form-group font-weight-bold">
                            <label for="rating">Rating*</label>
                            <input type="number" id="rating" class="form-control" step="0.1" required>
                        </div>
                        <div class="form-group font-weight-bold">
                            <label for="userId">User ID*</label>
                            <select id="userId" class="form-control" required>
                                <option value="">Select User ID</option>
                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="3">3</option>
                                <option value="4">4</option>
                                <option value="5">5</option>
                                <option value="6">6</option>
                                <option value="7">7</option>
                                <option value="8">8</option>
                                <option value="9">9</option>
                                <option value="10">10</option>
                        </select>
                        </div>
                        <div class="form-group font-weight-bold">
                            <label for="thumbnail">Thumbnail URL*</label>
                            <input type="url" id="thumbnail" class="form-control" required>
                        </div>
                        <button type="submit" id="addProductBtn" class="btn btn-primary btn-block font-weight-bold">Add Product</button>
                        <button type="button" id="updateProductBtn" class="btn btn-warning btn-block d-none font-weight-bold">Update Product</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="row mt-5" id="productContainer"></div>
</div>

<div id="spinner" class="d-none">
    <div class="spinner-border text-primary" role="status">
        <span class="sr-only">Loading...</span>
    </div>
</div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="./assets/js/app.js"></script>
</body>
</html>
